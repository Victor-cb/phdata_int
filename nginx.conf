events {
    worker_connections 1024;
}

http {
    # Upstream for blue environment (current production)
    upstream api_blue {
        server api-blue:8080;
    }

    # Upstream for green environment (new version)
    upstream api_green {
        server api-green:8080;
    }

    # Active upstream - change this to switch traffic
    # Options: api_blue or api_green
    upstream api_active {
        server api-blue:8080;  # Change to api-green:8080 to switch
    }

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health {
            proxy_pass http://api_active/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Prediction endpoints
        location / {
            proxy_pass http://api_active;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Blue environment (for testing)
        location /blue/ {
            rewrite ^/blue/(.*) /$1 break;
            proxy_pass http://api_blue;
            proxy_set_header Host $host;
        }

        # Green environment (for testing)
        location /green/ {
            rewrite ^/green/(.*) /$1 break;
            proxy_pass http://api_green;
            proxy_set_header Host $host;
        }
    }
}
