services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - MODEL_VERSION=${MODEL_VERSION:-1.0}
      - MODEL_DIR=${MODEL_DIR:-model}
    volumes:
      - ./model:/app/model:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
