services:
  # Blue environment - Current production version
  api-blue:
    build: .
    ports:
      - "8080:8080"
    environment:
      - FLASK_ENV=production
      - MODEL_VERSION=1.0
      - MODEL_DIR=models/v1.0
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    container_name: house-price-api-blue

  # Green environment - New version for testing
  api-green:
    build: .
    ports:
      - "8081:8080"
    environment:
      - FLASK_ENV=production
      - MODEL_VERSION=2.0
      - MODEL_DIR=models/v2.0
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    container_name: house-price-api-green
    profiles:
      - green  # Only start when explicitly requested

  # Optional: Nginx load balancer for traffic switching
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-blue
    restart: unless-stopped
    profiles:
      - loadbalancer
